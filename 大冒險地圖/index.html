<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大冒險地圖</title>
  <style>
    :root {
      --ink: #fff7df;
      --muted: #dbe4f0;
      --gold: #facc15;
      --green: #22c55e;
      --red: #ef4444;
      --shadow: rgba(0, 0, 0, .42);
      --radius: 8px;
      --app-width: 100vw;
      --app-height: 100vh;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: var(--app-height);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      background: #0f172a;
      overflow: hidden;
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: var(--radius);
      color: #111827;
      background: linear-gradient(180deg, #fde68a, #f59e0b);
      font: inherit;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 7px 0 rgba(0,0,0,.28), 0 14px 26px var(--shadow);
      transition: transform .16s ease, filter .16s ease;
    }

    button:hover,
    button:focus-visible {
      transform: translateY(-2px);
      filter: brightness(1.06);
      outline: 2px solid rgba(250,204,21,.75);
      outline-offset: 3px;
    }

    .cover {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      width: var(--app-width);
      height: var(--app-height);
      background: #020617;
      cursor: pointer;
      transition: opacity .7s ease, visibility .7s ease;
    }

    .cover.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #020617;
    }

    .map-screen {
      position: relative;
      display: grid;
      place-items: center;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      width: var(--app-width);
      height: var(--app-height);
      padding: max(10px, env(safe-area-inset-top)) max(10px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(10px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 20% 15%, rgba(56,189,248,.16), transparent 22rem),
        radial-gradient(circle at 85% 16%, rgba(250,204,21,.14), transparent 18rem),
        #0f172a;
    }

    .map-wrap {
      position: relative;
      width: min(calc(var(--app-width) - 20px), calc((var(--app-height) - 20px) * var(--map-ratio, 1.777)));
      height: min(calc(var(--app-height) - 20px), calc((var(--app-width) - 20px) / var(--map-ratio, 1.777)));
      max-width: calc(var(--app-width) - 20px);
      max-height: calc(var(--app-height) - 20px);
      display: grid;
      place-items: center;
      filter: drop-shadow(0 24px 34px rgba(0,0,0,.38));
    }

    .map-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    .top-info {
      position: fixed;
      right: max(10px, env(safe-area-inset-right));
      top: max(10px, env(safe-area-inset-top));
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, .78);
      box-shadow: 0 12px 28px var(--shadow);
      backdrop-filter: blur(4px);
    }

    .owned {
      color: #fff3b0;
      font-weight: 900;
      white-space: nowrap;
    }

    .clear-btn {
      min-height: 38px;
      padding: 0 12px;
      color: #fff;
      background: linear-gradient(180deg, #64748b, #334155);
      box-shadow: 0 5px 0 rgba(0,0,0,.26), 0 10px 20px var(--shadow);
    }

    .hotspot {
      position: absolute;
      border-radius: 16px;
      cursor: pointer;
      background: rgba(255,255,255,0);
      transition: box-shadow .18s ease, background .18s ease, transform .18s ease;
      min-width: 44px;
      min-height: 44px;
    }

    .hotspot:hover,
    .hotspot:focus-visible {
      background: rgba(255, 245, 180, .08);
      box-shadow: 0 0 0 3px rgba(255,255,255,.18), 0 0 34px rgba(250,204,21,.55);
      transform: scale(1.015);
      outline: none;
    }

    /* 百分比座標跟著地圖縮放，已對準四個牌匾。 */
    .hotspot-dynasty { left: 7.2%; top: 34.8%; width: 17%; height: 10%; }
    .hotspot-idiom { left: 76.8%; top: 36.7%; width: 16.8%; height: 10.2%; }
    .hotspot-warrior { left: 7.3%; top: 83.2%; width: 16.8%; height: 9.6%; }
    .hotspot-gate { left: 40%; top: 64.6%; width: 17.7%; height: 9.8%; }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: none;
      place-items: center;
      padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      background: rgba(2, 6, 23, .72);
      backdrop-filter: blur(4px);
    }

    .modal.show { display: grid; }

    .door {
      width: min(820px, 100%);
      max-height: min(92vh, 820px);
      max-height: min(92dvh, 820px);
      max-height: min(calc(var(--app-height) - 24px), 820px);
      overflow: auto;
      padding: 22px;
      border: 2px solid rgba(250,204,21,.55);
      border-radius: var(--radius);
      background:
        linear-gradient(90deg, rgba(255,255,255,.045) 2px, transparent 2px) 0 0 / 42px 100%,
        linear-gradient(180deg, #5b361f, #2d1b13);
      box-shadow: 0 28px 70px rgba(0,0,0,.52), 0 0 42px rgba(250,204,21,.18);
    }

    .door-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
    }

    .door h2 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.7rem);
      text-shadow: 0 4px 0 rgba(0,0,0,.32);
    }

    .close-btn {
      width: 46px;
      min-height: 42px;
      color: #fff;
      background: linear-gradient(180deg, #ef4444, #991b1b);
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .slot {
      display: grid;
      place-items: center;
      gap: 8px;
      min-height: 150px;
      padding: 12px;
      border: 3px dashed rgba(255,255,255,.25);
      border-radius: var(--radius);
      background: rgba(0,0,0,.2);
      text-align: center;
      transition: border-color .16s ease, background .16s ease, transform .16s ease;
    }

    .slot.over {
      border-color: var(--gold);
      background: rgba(250,204,21,.13);
      transform: translateY(-2px);
    }

    .slot.filled {
      border-style: solid;
      border-color: var(--green);
      background: rgba(34,197,94,.16);
    }

    .slot.wrong {
      animation: wrong .28s ease;
      border-color: var(--red);
      background: rgba(239,68,68,.2);
    }

    .slot-label {
      color: #ffe8a3;
      font-weight: 900;
    }

    .slot-placeholder {
      color: rgba(255,255,255,.62);
      font-size: .92rem;
    }

    .bag {
      padding: 16px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: var(--radius);
      background: rgba(15, 23, 42, .45);
    }

    .bag-title {
      margin: 0 0 12px;
      color: #fff3b0;
      font-weight: 900;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      min-height: 80px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 58px;
      padding: 0 14px;
      border: 2px solid rgba(250,204,21,.62);
      border-radius: var(--radius);
      color: #111827;
      background: linear-gradient(180deg, #fef3c7, #facc15);
      font-weight: 1000;
      cursor: grab;
      user-select: none;
      touch-action: none;
      box-shadow: 0 7px 0 rgba(0,0,0,.2), 0 12px 22px rgba(0,0,0,.25);
    }

    .badge.placed {
      cursor: default;
      border-color: var(--green);
      background: linear-gradient(180deg, #bbf7d0, #4ade80);
    }

    .badge.dragging { opacity: .45; }
    .empty-bag { color: var(--muted); line-height: 1.6; }

    .win {
      display: none;
      text-align: center;
      padding: 28px 16px;
    }

    .win.show { display: block; }
    .gate-game.hidden { display: none; }

    .win h2 {
      margin: 0 0 12px;
      font-size: clamp(2.2rem, 6vw, 4rem);
      color: #fff3b0;
      text-shadow: 0 5px 0 rgba(0,0,0,.3);
    }

    .again-btn {
      margin-top: 16px;
      padding: 0 24px;
    }

    .ending-overlay {
      position: fixed;
      inset: 0;
      z-index: 70;
      display: none;
      place-items: center;
      width: var(--app-width);
      height: var(--app-height);
      padding: 10px;
      color: #2b1b11;
      background: radial-gradient(circle at 50% 45%, rgba(255,232,160,.18), rgba(2,6,23,.88) 64%);
      cursor: pointer;
    }

    .ending-overlay.show { display: grid; }

    .ending-frame {
      position: relative;
      width: min(calc(var(--app-width) - 20px), calc((var(--app-height) - 20px) * 1.777));
      height: min(calc(var(--app-height) - 20px), calc((var(--app-width) - 20px) / 1.777));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border: 4px solid #4b2e1c;
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(83,53,27,.08) 1px, transparent 1px) 0 0 / 18px 100%,
        radial-gradient(circle at 50% 42%, #f6d991, #d9a55c 64%, #8e5630);
      box-shadow: 0 28px 80px rgba(0,0,0,.55), inset 0 0 60px rgba(88,52,24,.28);
    }

    .ending-image {
      position: absolute;
      inset: 0;
      z-index: 7;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #06111a;
      display: none;
    }

    .ending-frame.image-mode .ending-image {
      display: block;
    }

    .ending-frame.image-mode .ending-scene,
    .ending-frame.image-mode .ending-copy,
    .ending-frame.image-mode .ending-page,
    .ending-frame.image-mode .ending-complete {
      display: none;
    }

    .ending-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 18%, rgba(255,255,255,.22), transparent 14%),
        radial-gradient(circle at 78% 16%, rgba(255,255,255,.18), transparent 13%),
        repeating-linear-gradient(135deg, rgba(49,33,18,.08) 0 2px, transparent 2px 7px);
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .ending-scene {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .ending-scene::before,
    .ending-scene::after {
      content: "";
      position: absolute;
      left: -8%;
      right: -8%;
      height: 19%;
      background:
        radial-gradient(ellipse at 8% 50%, transparent 0 35%, rgba(25,71,102,.38) 36% 40%, transparent 41%),
        radial-gradient(ellipse at 18% 50%, transparent 0 35%, rgba(25,71,102,.38) 36% 40%, transparent 41%),
        radial-gradient(ellipse at 28% 50%, transparent 0 35%, rgba(25,71,102,.38) 36% 40%, transparent 41%);
      background-size: 180px 55px;
      opacity: .55;
    }

    .ending-scene::before { top: 7%; }
    .ending-scene::after { bottom: 0; opacity: .75; }

    .fuji {
      position: absolute;
      left: 8%;
      top: 12%;
      width: 28%;
      height: 34%;
      clip-path: polygon(50% 0, 0 100%, 100% 100%);
      background: linear-gradient(180deg, #f7f0dc 0 18%, #4d7892 19% 55%, #243f55 56%);
      opacity: .86;
      filter: drop-shadow(0 5px 0 rgba(51,32,17,.28));
    }

    .torii {
      position: absolute;
      left: 39%;
      top: 14%;
      width: 24%;
      height: 49%;
      border-left: 18px solid #a63a20;
      border-right: 18px solid #a63a20;
      border-bottom: 14px solid #a63a20;
      filter: drop-shadow(0 6px 0 rgba(56,31,18,.35));
    }

    .torii::before,
    .torii::after {
      content: "";
      position: absolute;
      left: -42%;
      right: -42%;
      background: #9b321e;
      border: 4px solid #4b2e1c;
    }

    .torii::before { top: -8%; height: 12%; }
    .torii::after { top: 16%; height: 8%; }

    .gate-light {
      position: absolute;
      left: 42%;
      top: 31%;
      width: 18%;
      height: 28%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,244,180,.92), rgba(255,202,69,.35) 46%, transparent 70%);
      opacity: .25;
      transition: opacity .25s ease;
    }

    .seal {
      position: absolute;
      display: grid;
      place-items: center;
      width: 8.5%;
      aspect-ratio: 1;
      border: 5px solid #5b311d;
      border-radius: 50%;
      color: #fff6cc;
      background: radial-gradient(circle, #c6472a, #7c2118);
      font-size: clamp(1rem, 3vw, 2.4rem);
      font-weight: 1000;
      box-shadow: 0 0 22px rgba(255,213,99,.52);
    }

    .seal-a { left: 15%; top: 58%; background: radial-gradient(circle, #276c9a, #163f61); }
    .seal-b { left: 46%; top: 59%; }
    .seal-c { left: 75%; top: 56%; background: radial-gradient(circle, #408650, #1e5632); }

    .scene-1 .seal-a { animation: flyA 1.8s ease-in-out infinite alternate; }
    .scene-1 .seal-b { animation: flyB 1.8s ease-in-out infinite alternate; }
    .scene-1 .seal-c { animation: flyC 1.8s ease-in-out infinite alternate; }

    .scene-2 .seal-a { left: 43%; top: 43%; transform: scale(.72); }
    .scene-2 .seal-b { left: 48%; top: 43%; transform: scale(.72); }
    .scene-2 .seal-c { left: 53%; top: 43%; transform: scale(.72); }
    .scene-2 .gate-light { opacity: .95; }

    .road {
      position: absolute;
      left: 34%;
      top: 58%;
      width: 34%;
      height: 42%;
      clip-path: polygon(42% 0, 58% 0, 100% 100%, 0 100%);
      background: repeating-linear-gradient(180deg, rgba(72,43,24,.4) 0 4px, rgba(241,205,130,.65) 4px 18px);
      border-inline: 4px solid rgba(72,43,24,.45);
      opacity: .72;
    }

    .landmark {
      position: absolute;
      padding: .45em .65em;
      border: 2px solid #6b3d22;
      border-radius: 6px;
      color: #4a2d18;
      background: rgba(255,239,183,.72);
      font-size: clamp(.7rem, 1.8vw, 1.1rem);
      font-weight: 900;
      opacity: 0;
    }

    .scene-3 .landmark { opacity: .78; }
    .landmark-a { left: 23%; top: 45%; }
    .landmark-b { left: 61%; top: 40%; }
    .landmark-c { left: 16%; top: 69%; }

    .traveler {
      position: absolute;
      left: 47%;
      top: 58%;
      width: 5%;
      height: 17%;
      border-radius: 45% 45% 20% 20%;
      background: linear-gradient(180deg, #263b55, #151f2e);
      border: 3px solid #4b2e1c;
      opacity: 0;
    }

    .traveler::before {
      content: "";
      position: absolute;
      left: 26%;
      top: -28%;
      width: 48%;
      aspect-ratio: 1;
      border-radius: 50%;
      background: #d49a5f;
      border: 3px solid #4b2e1c;
    }

    .scene-4 .traveler { opacity: 1; }
    .scene-4 .gate-light { opacity: 1; transform: scale(1.45); }
    .scene-4 .seal { opacity: .38; top: 16%; box-shadow: 0 0 32px rgba(255,239,185,.7); }

    .ending-copy {
      position: absolute;
      left: 4%;
      right: 4%;
      bottom: 4%;
      z-index: 5;
      display: grid;
      gap: .38rem;
      padding: clamp(10px, 2vw, 18px);
      border: 2px solid rgba(80,45,22,.75);
      border-radius: 8px;
      background: rgba(255, 244, 210, .88);
      box-shadow: 0 10px 26px rgba(0,0,0,.28);
    }

    .ending-title {
      color: #8b271a;
      font-size: clamp(1.15rem, 3vw, 2rem);
      font-weight: 1000;
      line-height: 1.15;
    }

    .ending-line {
      margin: 0;
      color: #2d1b10;
      font-size: clamp(.82rem, 2.1vw, 1.25rem);
      line-height: 1.45;
      font-weight: 800;
    }

    .ending-speech {
      margin-top: .2rem;
      color: #174766;
      font-size: clamp(.78rem, 1.9vw, 1.12rem);
      line-height: 1.42;
      font-weight: 900;
    }

    .ending-page {
      position: absolute;
      right: 3%;
      top: 3%;
      z-index: 6;
      padding: .35em .7em;
      border-radius: 999px;
      color: #fff7df;
      background: rgba(45,27,16,.78);
      font-weight: 900;
      font-size: clamp(.75rem, 1.6vw, 1rem);
    }

    .ending-complete {
      position: absolute;
      inset: 0;
      z-index: 8;
      display: none;
      place-items: center;
      padding: 24px;
      text-align: center;
      background: radial-gradient(circle, rgba(255,235,160,.72), rgba(102,50,25,.86));
    }

    .ending-complete.show { display: grid; }

    .complete-card {
      width: min(620px, 100%);
      padding: clamp(22px, 4vw, 38px);
      border: 3px solid #5a321e;
      border-radius: 8px;
      background: rgba(255,244,210,.92);
      box-shadow: 0 18px 44px rgba(0,0,0,.32);
    }

    .complete-card h2 {
      margin: 0 0 12px;
      color: #8b271a;
      font-size: clamp(2rem, 7vw, 4.4rem);
      line-height: 1.05;
    }

    .complete-card p {
      margin: 7px 0;
      color: #2d1b10;
      font-weight: 900;
      line-height: 1.55;
      font-size: clamp(.95rem, 2.4vw, 1.35rem);
    }

    .ending-again {
      margin-top: 16px;
      padding: 0 24px;
    }

    .touch-ghost {
      position: fixed;
      z-index: 40;
      pointer-events: none;
      opacity: .92;
      transform: translate(-50%, -50%);
    }

    @keyframes wrong {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(8px); }
      75% { transform: translateX(-5px); }
    }

    @keyframes flyA { to { left: 42%; top: 43%; transform: scale(.75); } }
    @keyframes flyB { to { left: 48%; top: 43%; transform: scale(.75); } }
    @keyframes flyC { to { left: 54%; top: 43%; transform: scale(.75); } }

    @media (max-width: 760px) {
      .map-screen { padding: max(6px, env(safe-area-inset-top)) max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left)); }
      .map-wrap {
        width: min(calc(var(--app-width) - 12px), calc((var(--app-height) - 12px) * var(--map-ratio, 1.777)));
        height: min(calc(var(--app-height) - 12px), calc((var(--app-width) - 12px) / var(--map-ratio, 1.777)));
        max-width: calc(var(--app-width) - 12px);
        max-height: calc(var(--app-height) - 12px);
      }
      .top-info {
        right: max(6px, env(safe-area-inset-right));
        top: max(6px, env(safe-area-inset-top));
        gap: 6px;
        padding: 8px;
      }
      .owned { font-size: .92rem; }
      .clear-btn { min-height: 34px; padding: 0 9px; font-size: .88rem; }
      .slots { grid-template-columns: 1fr; }
    }

    @media (max-width: 520px) {
      .top-info {
        left: max(6px, env(safe-area-inset-left));
        right: max(6px, env(safe-area-inset-right));
        justify-content: space-between;
      }
      .clear-btn {
        max-width: 46%;
        overflow-wrap: anywhere;
      }
      .door {
        padding: 16px;
      }
      .door-head {
        align-items: flex-start;
      }
      .slot {
        min-height: 116px;
      }
      .badge {
        width: 100%;
        min-height: 54px;
      }
    }

    @media (orientation: portrait) and (max-width: 900px) {
      body { overflow: auto; }
      .map-screen {
        min-height: var(--app-height);
        height: auto;
        align-content: center;
        padding-top: max(76px, env(safe-area-inset-top));
      }
      .map-wrap {
        width: min(100vw - 12px, 100%);
        height: auto;
        aspect-ratio: var(--map-ratio, 1.777);
      }
    }

    @media (orientation: landscape) and (max-height: 560px) {
      html, body { overflow: hidden; }
      .map-screen {
        padding: 0;
        width: var(--app-width);
        height: var(--app-height);
      }
      .map-wrap {
        width: min(var(--app-width), calc(var(--app-height) * var(--map-ratio, 1.777)));
        height: min(var(--app-height), calc(var(--app-width) / var(--map-ratio, 1.777)));
        max-width: var(--app-width);
        max-height: var(--app-height);
      }
      .cover {
        width: var(--app-width);
        height: var(--app-height);
      }
      .cover img {
        width: var(--app-width);
        height: var(--app-height);
        object-fit: contain;
      }
      .top-info {
        top: max(4px, env(safe-area-inset-top));
        right: max(4px, env(safe-area-inset-right));
        gap: 5px;
        padding: 6px;
        transform: scale(.68);
        transform-origin: top right;
      }
      .owned { font-size: .95rem; }
      .clear-btn {
        min-height: 32px;
        padding: 0 10px;
        font-size: .88rem;
      }
      .modal {
        align-items: center;
      }
      .door {
        max-height: calc(var(--app-height) - 12px);
        padding: 14px;
      }
      .ending-overlay { padding: 0; }
      .ending-frame {
        width: min(var(--app-width), calc(var(--app-height) * 1.777));
        height: min(var(--app-height), calc(var(--app-width) / 1.777));
        border-width: 2px;
      }
      .ending-copy {
        left: 2%;
        right: 2%;
        bottom: 2%;
        gap: .18rem;
        padding: 8px 10px;
      }
      .ending-line,
      .ending-speech {
        line-height: 1.28;
      }
    }

    @supports not (height: 100dvh) {
      .map-screen { height: 100vh; }
      .map-wrap {
        width: min(100%, calc((100vh - 20px) * var(--map-ratio, 1.777)));
        height: min(100%, calc((100vw - 20px) / var(--map-ratio, 1.777)));
        max-height: calc(100vh - 20px);
      }
    }
  </style>
</head>
<body>
  <section id="cover" class="cover" aria-label="開場封面">
    <img src="cover.png" alt="大冒險封面" />
  </section>

  <main class="map-screen">
    <div class="top-info">
      <div class="owned">持有 <span id="ownedCount">0</span> / 3</div>
      <button id="clearBtn" class="clear-btn" type="button">🔄 清除進度</button>
    </div>

    <div id="mapWrap" class="map-wrap">
      <img id="mapImg" class="map-img" src="map-bg.png" alt="大冒險地圖" />

      <div class="hotspot hotspot-dynasty" role="button" tabindex="0" aria-label="前往朝代配對"></div>
      <div class="hotspot hotspot-idiom" role="button" tabindex="0" aria-label="前往成語填字"></div>
      <div class="hotspot hotspot-warrior" role="button" tabindex="0" aria-label="前往打怪 RPG"></div>
      <div class="hotspot hotspot-gate" role="button" tabindex="0" aria-label="打開通關大門"></div>

    </div>
  </main>

  <div id="gateModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="gateTitle">
    <div class="door">
      <div class="door-head">
        <h2 id="gateTitle">🔒 通關大門</h2>
        <button id="closeBtn" class="close-btn" type="button" aria-label="關閉">×</button>
      </div>

      <div id="gateGame" class="gate-game">
        <section id="slots" class="slots" aria-label="憑證凹槽"></section>
        <section class="bag">
          <p class="bag-title">背包欄</p>
          <div id="badges" class="badges"></div>
        </section>
      </div>

      <section id="winPanel" class="win">
        <h2>🏆 冒險完成！</h2>
        <p>總冒險時長：<strong id="totalTime">00 分 00 秒</strong></p>
        <button id="againBtn" class="again-btn" type="button">再次冒險</button>
      </section>
    </div>
  </div>

  <section id="endingOverlay" class="ending-overlay" aria-label="三印開門結局過場">
    <div id="endingFrame" class="ending-frame">
      <img id="endingImage" class="ending-image" src="ending-1.png" alt="三印開門 1/5" />
      <div id="endingScene" class="ending-scene scene-1">
        <div class="fuji"></div>
        <div class="torii"></div>
        <div class="gate-light"></div>
        <div class="road"></div>
        <div class="seal seal-a">朝</div>
        <div class="seal seal-b">成</div>
        <div class="seal seal-c">勇</div>
        <div class="landmark landmark-a">時代の祠</div>
        <div class="landmark landmark-b">言葉の茶屋</div>
        <div class="landmark landmark-c">鬼退治の森</div>
        <div class="traveler"></div>
      </div>
      <div id="endingPage" class="ending-page">1/4</div>
      <div id="endingCopy" class="ending-copy">
        <div id="endingTitle" class="ending-title">三印歸位</div>
        <p id="endingNarrationJa" class="ending-line">三つの印は、旅人の歩みを覚えていた。</p>
        <p id="endingNarrationZh" class="ending-line">三枚印章，記住了旅人的每一步。</p>
        <div id="endingSpeech" class="ending-speech"></div>
      </div>
      <div id="endingComplete" class="ending-complete">
        <div class="complete-card">
          <h2>冒險完成</h2>
          <p>あなたの絵巻は、ここからまた始まる。</p>
          <p>你的繪卷，將從此再次展開。</p>
          <p>總冒險時長：<strong id="endingTime">00 分 00 秒</strong></p>
          <button id="endingAgainBtn" class="ending-again" type="button">再次冒險</button>
        </div>
      </div>
    </div>
  </section>

  <script>
    const CERTS = [
      { id: "dynasty", key: "cert_dynasty", label: "朝代", badge: "朝代之印", icon: "🎴", href: "../示範1_日本時代配對/index.html" },
      { id: "idiom", key: "cert_idiom", label: "成語", badge: "成語之印", icon: "📝", href: "../示範2_日本史語彙填字/index.html" },
      { id: "warrior", key: "cert_warrior", label: "勇者", badge: "勇者之印", icon: "⚔️", href: "../示範3_打怪RPG/index.html" }
    ];

    const START_KEY = "adventure_start";
    const COVER_KEY = "adventure_cover_seen";
    const ENDING_KEY = "adventure_ending_seen";
    const ENDING_SCENES = [
      {
        className: "scene-1",
        image: "ending-1.png",
        title: "三印歸位",
        narrationJa: "三つの印は、旅人の歩みを覚えていた。",
        narrationZh: "三枚印章，記住了旅人的每一步。",
        speechJa: "",
        speechZh: ""
      },
      {
        className: "scene-2",
        image: "ending-2.png",
        title: "門扉初啟",
        narrationJa: "門は力ではなく、学びによって開かれる。",
        narrationZh: "門並非因力量而開，而是因學習而啟。",
        speechJa: "ここまで来た意味が、ようやく見えてきた。",
        speechZh: "走到這裡的意義，終於慢慢清楚了。"
      },
      {
        className: "scene-3",
        image: "ending-3.png",
        title: "絵巻の道",
        narrationJa: "終わりとは、絵巻を閉じることではない。",
        narrationZh: "所謂結束，並不是將繪卷合上。",
        speechJa: "次の一頁は、まだ白い。",
        speechZh: "下一頁，仍然等待被寫下。"
      },
      {
        className: "scene-4",
        image: "ending-4.png",
        title: "新たな旅立ち",
        narrationJa: "名を残す者ではなく、歩みを重ねる者が、物語を進める。",
        narrationZh: "推動故事前進的，不是留下名字的人，而是不斷前行的人。",
        speechJa: "では、参ろう。まだ見ぬ道へ。",
        speechZh: "那麼，出發吧。前往尚未見過的道路。"
      },
      {
        className: "scene-4",
        image: "ending-5.png",
        title: "冒險完成",
        narrationJa: "あなたの絵巻は、ここからまた始まる。",
        narrationZh: "你的繪卷，將從此再次展開。",
        speechJa: "",
        speechZh: ""
      }
    ];
    const $ = (id) => document.getElementById(id);
    let placed = {};
    let draggedId = "";
    let touchState = null;
    let endingIndex = 0;

    function init() {
      setupViewportSize();
      if (!localStorage.getItem(START_KEY)) {
        localStorage.setItem(START_KEY, String(Date.now()));
      }
      if (sessionStorage.getItem(COVER_KEY) === "true") {
        $("cover").classList.add("hidden");
      }
      setupMapRatio();
      updateProgress();
      bindHotspots();
      if ($("cover").classList.contains("hidden")) {
        window.setTimeout(checkAutoEnding, 450);
      }
    }

    function setupViewportSize() {
      const setSize = () => {
        const viewport = window.visualViewport;
        const width = Math.max(1, Math.floor(viewport ? viewport.width : window.innerWidth));
        const height = Math.max(1, Math.floor(viewport ? viewport.height : window.innerHeight));
        document.documentElement.style.setProperty("--app-width", `${width}px`);
        document.documentElement.style.setProperty("--app-height", `${height}px`);
      };

      setSize();
      window.addEventListener("resize", setSize, { passive: true });
      window.addEventListener("orientationchange", () => window.setTimeout(setSize, 180), { passive: true });
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", setSize, { passive: true });
        window.visualViewport.addEventListener("scroll", setSize, { passive: true });
      }
    }

    function setupMapRatio() {
      const img = $("mapImg");
      const applyRatio = () => {
        if (img.naturalWidth && img.naturalHeight) {
          $("mapWrap").style.setProperty("--map-ratio", img.naturalWidth / img.naturalHeight);
        }
      };
      img.addEventListener("load", applyRatio);
      applyRatio();
    }

    function hideCover() {
      sessionStorage.setItem(COVER_KEY, "true");
      $("cover").classList.add("hidden");
      window.setTimeout(checkAutoEnding, 650);
    }

    function hasCert(cert) {
      return localStorage.getItem(cert.key) === "true";
    }

    function allCertsOwned() {
      return CERTS.every(hasCert);
    }

    function checkAutoEnding() {
      if (allCertsOwned() && localStorage.getItem(ENDING_KEY) !== "true") {
        startEnding();
      }
    }

    function updateProgress() {
      const owned = CERTS.filter(hasCert);
      $("ownedCount").textContent = owned.length;
    }

    function bindHotspots() {
      document.querySelector(".hotspot-dynasty").addEventListener("click", () => goStage("dynasty"));
      document.querySelector(".hotspot-idiom").addEventListener("click", () => goStage("idiom"));
      document.querySelector(".hotspot-warrior").addEventListener("click", () => goStage("warrior"));
      document.querySelector(".hotspot-gate").addEventListener("click", openGate);
      document.querySelectorAll(".hotspot").forEach((spot) => {
        spot.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") {
            event.preventDefault();
            spot.click();
          }
        });
      });
    }

    function goStage(id) {
      const cert = CERTS.find((item) => item.id === id);
      if (cert) window.location.href = cert.href;
    }

    function openGate() {
      placed = {};
      $("gateModal").classList.add("show");
      $("gateGame").classList.remove("hidden");
      $("winPanel").classList.remove("show");
      renderSlots();
      renderBadges();
    }

    function closeGate() {
      $("gateModal").classList.remove("show");
    }

    function renderSlots() {
      $("slots").innerHTML = "";
      CERTS.forEach((cert) => {
        const slot = document.createElement("div");
        slot.className = "slot";
        slot.dataset.certId = cert.id;
        slot.innerHTML = `<div class="slot-label">${cert.label}</div><div class="slot-placeholder">拖曳憑證到這裡</div>`;
        slot.addEventListener("dragover", onDragOver);
        slot.addEventListener("dragleave", onDragLeave);
        slot.addEventListener("drop", onDrop);
        $("slots").appendChild(slot);
      });
    }

    function renderBadges() {
      $("badges").innerHTML = "";
      const owned = CERTS.filter(hasCert);
      if (!owned.length) {
        $("badges").innerHTML = `<div class="empty-bag">目前還沒有憑證。可以先挑戰任一關卡，再回來開門。</div>`;
        return;
      }
      owned.forEach((cert) => $("badges").appendChild(createBadge(cert)));
    }

    function createBadge(cert) {
      const badge = document.createElement("div");
      badge.className = "badge";
      badge.draggable = true;
      badge.dataset.certId = cert.id;
      badge.innerHTML = `<span>${cert.icon}</span><span>${cert.badge}</span>`;
      badge.addEventListener("dragstart", onDragStart);
      badge.addEventListener("dragend", onDragEnd);
      badge.addEventListener("pointerdown", onPointerDown);
      return badge;
    }

    function onDragStart(event) {
      if (event.currentTarget.classList.contains("placed")) {
        event.preventDefault();
        return;
      }
      draggedId = event.currentTarget.dataset.certId;
      event.dataTransfer.setData("text/plain", draggedId);
      event.currentTarget.classList.add("dragging");
    }

    function onDragEnd(event) {
      event.currentTarget.classList.remove("dragging");
      document.querySelectorAll(".slot.over").forEach((slot) => slot.classList.remove("over"));
    }

    function onDragOver(event) {
      event.preventDefault();
      event.currentTarget.classList.add("over");
    }

    function onDragLeave(event) {
      event.currentTarget.classList.remove("over");
    }

    function onDrop(event) {
      event.preventDefault();
      const slot = event.currentTarget;
      slot.classList.remove("over");
      const certId = event.dataTransfer.getData("text/plain") || draggedId;
      const badge = document.querySelector(`.badge[data-cert-id="${certId}"]`);
      judgeBadge(badge, slot);
    }

    function judgeBadge(badge, slot) {
      if (!badge || !slot || badge.classList.contains("placed")) return;
      const certId = badge.dataset.certId;
      if (certId === slot.dataset.certId) {
        slot.classList.add("filled");
        const placeholder = slot.querySelector(".slot-placeholder");
        if (placeholder) placeholder.remove();
        badge.classList.add("placed");
        badge.draggable = false;
        slot.appendChild(badge);
        placed[certId] = true;
        if (CERTS.every((cert) => placed[cert.id])) showWin();
      } else {
        slot.classList.add("wrong");
        window.setTimeout(() => slot.classList.remove("wrong"), 300);
      }
    }

    function onPointerDown(event) {
      const badge = event.currentTarget;
      if (event.pointerType === "mouse" || badge.classList.contains("placed")) return;
      event.preventDefault();
      const rect = badge.getBoundingClientRect();
      const ghost = badge.cloneNode(true);
      ghost.classList.add("touch-ghost");
      ghost.style.left = `${event.clientX}px`;
      ghost.style.top = `${event.clientY}px`;
      ghost.style.width = `${rect.width}px`;
      ghost.style.height = `${rect.height}px`;
      document.body.appendChild(ghost);
      badge.classList.add("dragging");
      touchState = { badge, ghost, pointerId: event.pointerId, activeSlot: null };
      badge.setPointerCapture(event.pointerId);
      badge.addEventListener("pointermove", onPointerMove);
      badge.addEventListener("pointerup", onPointerUp);
      badge.addEventListener("pointercancel", onPointerUp);
    }

    function onPointerMove(event) {
      if (!touchState || event.pointerId !== touchState.pointerId) return;
      touchState.ghost.style.left = `${event.clientX}px`;
      touchState.ghost.style.top = `${event.clientY}px`;
      touchState.ghost.style.display = "none";
      const below = document.elementFromPoint(event.clientX, event.clientY);
      touchState.ghost.style.display = "";
      const slot = below && below.closest(".slot");
      if (touchState.activeSlot && touchState.activeSlot !== slot) touchState.activeSlot.classList.remove("over");
      if (slot) slot.classList.add("over");
      touchState.activeSlot = slot;
    }

    function onPointerUp(event) {
      if (!touchState || event.pointerId !== touchState.pointerId) return;
      const { badge, ghost, activeSlot } = touchState;
      badge.releasePointerCapture(event.pointerId);
      badge.removeEventListener("pointermove", onPointerMove);
      badge.removeEventListener("pointerup", onPointerUp);
      badge.removeEventListener("pointercancel", onPointerUp);
      ghost.remove();
      badge.classList.remove("dragging");
      if (activeSlot) {
        activeSlot.classList.remove("over");
        judgeBadge(badge, activeSlot);
      }
      touchState = null;
    }

    function showWin() {
      closeGate();
      startEnding();
    }

    function startEnding() {
      endingIndex = 0;
      $("endingComplete").classList.remove("show");
      $("endingCopy").style.display = "";
      $("endingPage").style.display = "";
      $("endingFrame").classList.add("image-mode");
      $("endingOverlay").classList.add("show");
      renderEndingScene();
    }

    function renderEndingScene() {
      const scene = ENDING_SCENES[endingIndex];
      $("endingFrame").classList.add("image-mode");
      $("endingImage").src = scene.image;
      $("endingImage").alt = `${scene.title} ${endingIndex + 1}/${ENDING_SCENES.length}`;
      $("endingScene").className = `ending-scene ${scene.className}`;
      $("endingPage").textContent = `${endingIndex + 1}/${ENDING_SCENES.length}`;
      $("endingTitle").textContent = scene.title;
      $("endingNarrationJa").textContent = scene.narrationJa;
      $("endingNarrationZh").textContent = scene.narrationZh;
      $("endingSpeech").innerHTML = scene.speechJa
        ? `「${scene.speechJa}」<br>${scene.speechZh}`
        : "";
      if (endingIndex === ENDING_SCENES.length - 1) {
        localStorage.setItem(ENDING_KEY, "true");
      }
    }

    function advanceEnding() {
      if (!$("endingOverlay").classList.contains("show") || $("endingComplete").classList.contains("show")) return;
      if (endingIndex < ENDING_SCENES.length - 1) {
        endingIndex += 1;
        renderEndingScene();
      }
    }

    function showEndingComplete() {
      localStorage.setItem(ENDING_KEY, "true");
      $("endingCopy").style.display = "none";
      $("endingPage").style.display = "none";
      $("endingComplete").classList.add("show");
      const started = Number(localStorage.getItem(START_KEY)) || Date.now();
      const seconds = Math.max(0, Math.floor((Date.now() - started) / 1000));
      const mm = String(Math.floor(seconds / 60)).padStart(2, "0");
      const ss = String(seconds % 60).padStart(2, "0");
      $("totalTime").textContent = `${mm} 分 ${ss} 秒`;
      $("endingTime").textContent = `${mm} 分 ${ss} 秒`;
    }

    function clearProgress() {
      localStorage.clear();
      sessionStorage.clear();
      localStorage.setItem(START_KEY, String(Date.now()));
      updateProgress();
      closeGate();
      $("endingOverlay").classList.remove("show");
      $("endingFrame").classList.add("image-mode");
      $("endingCopy").style.display = "";
      $("endingPage").style.display = "";
      $("endingComplete").classList.remove("show");
      $("cover").classList.remove("hidden");
    }

    $("cover").addEventListener("click", hideCover);
    $("closeBtn").addEventListener("click", closeGate);
    $("clearBtn").addEventListener("click", clearProgress);
    $("againBtn").addEventListener("click", clearProgress);
    $("endingOverlay").addEventListener("click", advanceEnding);
    $("endingImage").addEventListener("error", () => {
      $("endingFrame").classList.remove("image-mode");
    });
    $("endingAgainBtn").addEventListener("click", (event) => {
      event.stopPropagation();
      clearProgress();
    });
    $("gateModal").addEventListener("click", (event) => {
      if (event.target.id === "gateModal") closeGate();
    });

    init();
  </script>
</body>
</html>
